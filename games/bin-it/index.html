<!DOCTYPE html>

<title>BIN IT!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0A0A1A;
    width: 100%; height: 100%;
    overflow: hidden;

<body>
<canvas id="game"></canvas>
<script>
// ---- ENGINE START (inlined from engine.js) ----

/**
 * ARCADE ENGINE v1.0
 * Shared game engine for casual mobile arcade games.
 * Bold & Vibrant visual style.
 */

const THEME = {
  bgDark: '#0A0A1A', bgGrad1: '#0F0C29', bgGrad2: '#1A1A3E',
  primary: '#FF6B35', primaryLight: '#FF9F1C', primaryDark: '#CC4420',
  accent: '#00F5D4', accentLight: '#00FFE0', accentDark: '#00BBF9',
  highlight: '#FEE440', highlightDark: '#E6CC00',
  success: '#00F5D4', fail: '#FF006E',
  textWhite: '#FFFFFF', textDim: 'rgba(255,255,255,0.4)',
  particles: ['#FF006E', '#FB5607', '#FFBE0B', '#00F5D4', '#8338EC', '#FF6B35'],
  uiBg: 'rgba(10, 10, 26, 0.85)', uiBorder: 'rgba(255, 255, 255, 0.1)',
  uiButton: '#FF6B35', uiButtonHover: '#FF9F1C',
};

const Ease = {
  linear: t => t, inQuad: t => t * t, outQuad: t => t * (2 - t),
  inOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
  outCubic: t => (--t) * t * t + 1,
  outBack: t => { const s = 1.70158; return (t -= 1) * t * ((s + 1) * t + s) + 1; },
  outElastic: t => { if (t === 0 || t === 1) return t; return Math.pow(2, -10 * t) * Math.sin((t - 0.1) * 5 * Math.PI) + 1; },
  outBounce: t => { if (t < 1/2.75) return 7.5625*t*t; if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75; if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375; return 7.5625*(t-=2.625/2.75)*t+0.984375; },
};

class Pool {
  constructor(factory, reset, initialSize = 50) { this.factory = factory; this.resetFn = reset; this.pool = []; this.active = []; for (let i = 0; i < initialSize; i++) this.pool.push(factory()); }
  get() { const obj = this.pool.length > 0 ? this.pool.pop() : this.factory(); this.active.push(obj); return obj; }
  release(obj) { const idx = this.active.indexOf(obj); if (idx !== -1) { this.active.splice(idx, 1); this.resetFn(obj); this.pool.push(obj); } }
  releaseAll() { while (this.active.length > 0) { const obj = this.active.pop(); this.resetFn(obj); this.pool.push(obj); } }
  forEach(fn) { for (let i = this.active.length - 1; i >= 0; i--) fn(this.active[i], i); }
  get count() { return this.active.length; }
}

class ParticleSystem {
  constructor() { this.pool = new Pool(() => ({ x:0,y:0,vx:0,vy:0,size:0,life:0,maxLife:1,color:'#fff',gravity:0,drag:1,type:'circle' }), p => { p.life = 0; }, 200); }
  emit(x, y, count, options = {}) {
    const { speed=[2,5], size=[2,5], life=[0.5,1.2], colors=THEME.particles, gravity=0, drag=0.98, spread=Math.PI*2, angle=-Math.PI/2, type='circle' } = options;
    for (let i = 0; i < count; i++) { const p = this.pool.get(); const a = angle + (Math.random()-0.5)*spread; const s = speed[0]+Math.random()*(speed[1]-speed[0]); p.x=x+(Math.random()-0.5)*6; p.y=y+(Math.random()-0.5)*6; p.vx=Math.cos(a)*s; p.vy=Math.sin(a)*s; p.size=size[0]+Math.random()*(size[1]-size[0]); p.maxLife=life[0]+Math.random()*(life[1]-life[0]); p.life=p.maxLife; p.color=colors[Math.floor(Math.random()*colors.length)]; p.gravity=gravity; p.drag=drag; p.type=type; }
  }
  update(dt) { this.pool.forEach(p => { p.life-=dt; if(p.life<=0){this.pool.release(p);return;} p.vy+=p.gravity*dt; p.vx*=p.drag; p.vy*=p.drag; p.x+=p.vx; p.y+=p.vy; }); }
  draw(ctx) { this.pool.forEach(p => { const alpha=Math.max(0,p.life/p.maxLife); const ss=0.3+alpha*0.7; ctx.globalAlpha=alpha; if(p.type==='circle'){ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.size*ss,0,Math.PI*2);ctx.fill();}else if(p.type==='square'){ctx.fillStyle=p.color;const s=p.size*ss;ctx.fillRect(p.x-s,p.y-s,s*2,s*2);}else if(p.type==='star'){ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;drawStar(ctx,p.x,p.y,5,p.size*ss,p.size*ss*0.5);ctx.fill();} }); ctx.shadowBlur=0; ctx.globalAlpha=1; }
  clear() { this.pool.releaseAll(); }
}

function drawStar(ctx,cx,cy,spikes,outerR,innerR) { let rot=-Math.PI/2; const step=Math.PI/spikes; ctx.beginPath(); for(let i=0;i<spikes*2;i++){const r=i%2===0?outerR:innerR;const x=cx+Math.cos(rot)*r;const y=cy+Math.sin(rot)*r;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);rot+=step;} ctx.closePath(); }

class Juice {
  constructor() { this.shakeAmount=0; this.shakeDecay=0.9; this.flashAlpha=0; this.flashColor='#fff'; this.slowMotion=1; this.slowMotionTarget=1; }
  shake(amount=8) { this.shakeAmount=Math.max(this.shakeAmount,amount); }
  flash(color='#fff',alpha=0.3) { this.flashColor=color; this.flashAlpha=alpha; }
  slowMo(factor=0.2,duration=0.3) { this.slowMotion=factor; this.slowMotionTarget=1; this._slowMoDuration=duration; this._slowMoTimer=0; }
  update(dt) { if(this.shakeAmount>0){this.shakeAmount*=this.shakeDecay;if(this.shakeAmount<0.5)this.shakeAmount=0;} if(this.flashAlpha>0){this.flashAlpha-=dt*3;if(this.flashAlpha<0)this.flashAlpha=0;} if(this.slowMotion<this.slowMotionTarget){this._slowMoTimer+=dt;if(this._slowMoTimer>=this._slowMoDuration)this.slowMotion=1;else this.slowMotion+=(1-this.slowMotion)*dt*3;} }
  applyShake(ctx) { if(this.shakeAmount>0){ctx.translate((Math.random()-0.5)*this.shakeAmount,(Math.random()-0.5)*this.shakeAmount);} }
  drawFlash(ctx,w,h) { if(this.flashAlpha>0){ctx.fillStyle=this.flashColor;ctx.globalAlpha=this.flashAlpha;ctx.fillRect(0,0,w,h);ctx.globalAlpha=1;} }
  getTimeScale() { return this.slowMotion; }
}

class SoundManager {
  constructor() { this.ctx=null; this.enabled=true; this.volume=0.3; this._initialized=false; }
  init() { if(this._initialized)return; try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this._initialized=true;}catch(e){this.enabled=false;} }
  _play(freq,type,duration,vol=1,slide=0) { if(!this.enabled||!this.ctx)return; if(this.ctx.state==='suspended')this.ctx.resume(); const osc=this.ctx.createOscillator();const gain=this.ctx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,this.ctx.currentTime);if(slide)osc.frequency.exponentialRampToValueAtTime(Math.max(freq+slide,1),this.ctx.currentTime+duration);gain.gain.setValueAtTime(this.volume*vol,this.ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+duration);osc.connect(gain);gain.connect(this.ctx.destination);osc.start();osc.stop(this.ctx.currentTime+duration); }
  throw() { this._play(220,'sine',0.15,0.4,200); }
  score() { this._play(523,'sine',0.1,0.5); setTimeout(()=>this._play(659,'sine',0.1,0.5),80); setTimeout(()=>this._play(784,'sine',0.15,0.5),160); }
  combo(level) { const b=523+level*60; this._play(b,'sine',0.1,0.5); setTimeout(()=>this._play(b*1.25,'sine',0.1,0.5),60); setTimeout(()=>this._play(b*1.5,'sine',0.2,0.6),120); }
  miss() { this._play(200,'sawtooth',0.2,0.3,-100); }
  tap() { this._play(800,'sine',0.05,0.2); }
  gameOver() { this._play(400,'sawtooth',0.15,0.4,-80); setTimeout(()=>this._play(300,'sawtooth',0.15,0.4,-80),150); setTimeout(()=>this._play(200,'sawtooth',0.3,0.4,-100),300); }
  newBest() { for(let i=0;i<5;i++)setTimeout(()=>this._play(523+i*80,'sine',0.12,0.4),i*80); }
  click() { this._play(600,'sine',0.04,0.15); }
}

class TweenManager {
  constructor() { this.tweens=[]; }
  add(target,props,duration,ease=Ease.outCubic,onComplete=null) { const t={target,startProps:{},endProps:props,duration,elapsed:0,ease,onComplete}; for(const k in props)t.startProps[k]=target[k]; this.tweens.push(t); return t; }
  update(dt) { for(let i=this.tweens.length-1;i>=0;i--){const t=this.tweens[i];t.elapsed+=dt;const p=Math.min(t.elapsed/t.duration,1);const ep=t.ease(p);for(const k in t.endProps)t.target[k]=t.startProps[k]+(t.endProps[k]-t.startProps[k])*ep;if(p>=1){this.tweens.splice(i,1);if(t.onComplete)t.onComplete();}} }
  clear() { this.tweens=[]; }
}

class FloatingTextManager {
  constructor() { this.pool = new Pool(() => ({x:0,y:0,text:'',color:'#fff',size:24,life:0,maxLife:1,vy:-40,scale:1,glow:true}), t=>{t.life=0;}, 30); }
  spawn(x,y,text,options={}) { const t=this.pool.get(); t.x=x;t.y=y;t.text=text;t.color=options.color||THEME.success;t.size=options.size||24;t.maxLife=options.duration||1;t.life=t.maxLife;t.vy=options.vy||-50;t.scale=options.scale||1;t.glow=options.glow!==false; return t; }
  update(dt) { this.pool.forEach(t=>{t.life-=dt;if(t.life<=0){this.pool.release(t);return;}t.y+=t.vy*dt;}); }
  draw(ctx) { this.pool.forEach(t=>{const a=Math.max(0,t.life/t.maxLife);const sc=t.scale*(0.8+Ease.outBack(1-a)*0.4);ctx.globalAlpha=a;ctx.fillStyle=t.color;if(t.glow){ctx.shadowColor=t.color;ctx.shadowBlur=15;}ctx.font=`bold ${t.size*sc}px 'Arial Black','Impact',sans-serif`;ctx.textAlign='center';ctx.fillText(t.text,t.x,t.y);ctx.shadowBlur=0;}); ctx.globalAlpha=1; }
  clear() { this.pool.releaseAll(); }
}

class InputHandler {
  constructor(canvas,cw,ch) { this.canvas=canvas;this.cw=cw;this.ch=ch;this.isDragging=false;this.dragStart={x:0,y:0};this.dragCurrent={x:0,y:0};this._callbacks={tap:[],drag_start:[],drag_move:[],drag_end:[]};this._bindEvents(); }
  on(event,cb) { if(this._callbacks[event])this._callbacks[event].push(cb); }
  _emit(event,data) { this._callbacks[event].forEach(cb=>cb(data)); }
  _getPos(e) { const r=this.canvas.getBoundingClientRect();const sx=this.cw/r.width;const sy=this.ch/r.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy}; }
  _bindEvents() {
    const onStart=e=>{if(e.touches)e.preventDefault();const p=this._getPos(e);this.isDragging=true;this.dragStart={...p};this.dragCurrent={...p};this._emit('drag_start',{x:p.x,y:p.y});};
    const onMove=e=>{if(!this.isDragging)return;if(e.touches)e.preventDefault();const p=this._getPos(e);this.dragCurrent={...p};this._emit('drag_move',{x:p.x,y:p.y,dx:p.x-this.dragStart.x,dy:p.y-this.dragStart.y,startX:this.dragStart.x,startY:this.dragStart.y});};
    const onEnd=e=>{if(!this.isDragging)return;if(e.touches)e.preventDefault();this.isDragging=false;const dx=this.dragCurrent.x-this.dragStart.x;const dy=this.dragCurrent.y-this.dragStart.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<10)this._emit('tap',{x:this.dragStart.x,y:this.dragStart.y});this._emit('drag_end',{x:this.dragCurrent.x,y:this.dragCurrent.y,dx,dy,startX:this.dragStart.x,startY:this.dragStart.y,distance:dist,power:Math.min(dist/150,1)});};
    this.canvas.addEventListener('touchstart',onStart,{passive:false});this.canvas.addEventListener('touchmove',onMove,{passive:false});this.canvas.addEventListener('touchend',onEnd,{passive:false});
    this.canvas.addEventListener('mousedown',onStart);this.canvas.addEventListener('mousemove',onMove);this.canvas.addEventListener('mouseup',onEnd);window.addEventListener('mouseup',onEnd);
  }
}

class Background {
  constructor(w,h) { this.w=w;this.h=h;this.stars=[];for(let i=0;i<50;i++)this.stars.push({x:Math.random()*w,y:Math.random()*h,size:Math.random()*2+0.5,speed:Math.random()*0.3+0.1}); }
  draw(ctx,time) { const g=ctx.createLinearGradient(0,0,0,this.h);g.addColorStop(0,THEME.bgGrad1);g.addColorStop(1,THEME.bgGrad2);ctx.fillStyle=g;ctx.fillRect(0,0,this.w,this.h);this.stars.forEach(s=>{ctx.globalAlpha=0.2+Math.sin(time*s.speed*5+s.x)*0.3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1; }
}

class UI {
  constructor(w,h) { this.w=w;this.h=h;this.scoreDisplay=0;this.bestScore=parseInt(localStorage.getItem('arcade_best')||'0');this._buttons=[]; }
  updateScore(ts,dt) { if(this.scoreDisplay<ts){this.scoreDisplay+=Math.max(1,(ts-this.scoreDisplay)*dt*10);if(this.scoreDisplay>ts)this.scoreDisplay=ts;} }
  saveBest(score) { if(score>this.bestScore){this.bestScore=score;localStorage.setItem('arcade_best',String(score));return true;}return false; }
  drawScore(ctx,score,combo,time) { ctx.fillStyle=THEME.textWhite;ctx.shadowColor=THEME.primary;ctx.shadowBlur=20;ctx.font="bold 56px 'Arial Black',Impact,sans-serif";ctx.textAlign='center';ctx.fillText(Math.floor(this.scoreDisplay),this.w/2,this.h-55);ctx.shadowBlur=0;if(combo>1){const p=1+Math.sin(time*6)*0.08;ctx.fillStyle=THEME.highlight;ctx.shadowColor=THEME.highlight;ctx.shadowBlur=12;ctx.font=`bold ${20*p}px 'Arial Black',Impact,sans-serif`;ctx.fillText(`COMBO x${combo}`,this.w/2,this.h-22);ctx.shadowBlur=0;} }
  drawMenuScreen(ctx,gameName,time) { ctx.fillStyle='rgba(10,10,26,0.6)';ctx.fillRect(0,0,this.w,this.h);const ty=this.h*0.3;const sc=1+Math.sin(time*2)*0.03;ctx.save();ctx.translate(this.w/2,ty);ctx.scale(sc,sc);ctx.fillStyle=THEME.textWhite;ctx.shadowColor=THEME.primary;ctx.shadowBlur=30;ctx.font="bold 52px 'Arial Black',Impact,sans-serif";ctx.textAlign='center';ctx.fillText(gameName,0,0);ctx.shadowBlur=0;ctx.restore();if(this.bestScore>0){ctx.fillStyle=THEME.highlight;ctx.font="bold 18px 'Arial Black',Impact,sans-serif";ctx.textAlign='center';ctx.fillText(`BEST: ${this.bestScore}`,this.w/2,ty+45);}const a=0.4+Math.sin(time*3)*0.4;ctx.globalAlpha=a;ctx.fillStyle=THEME.textWhite;ctx.font="600 18px Arial,sans-serif";ctx.fillText('TAP TO PLAY',this.w/2,this.h*0.65);ctx.globalAlpha=1; }
  drawGameOverScreen(ctx,score,bestScore,isNewBest,time) { ctx.fillStyle='rgba(10,10,26,0.8)';ctx.fillRect(0,0,this.w,this.h);const cy=this.h*0.35;ctx.fillStyle=THEME.fail;ctx.shadowColor=THEME.fail;ctx.shadowBlur=20;ctx.font="bold 42px 'Arial Black',Impact,sans-serif";ctx.textAlign='center';ctx.fillText('GAME OVER',this.w/2,cy);ctx.shadowBlur=0;ctx.fillStyle=THEME.textWhite;ctx.font="bold 64px 'Arial Black',Impact,sans-serif";ctx.fillText(score,this.w/2,cy+70);if(isNewBest){const p=1+Math.sin(time*5)*0.1;ctx.fillStyle=THEME.highlight;ctx.shadowColor=THEME.highlight;ctx.shadowBlur=15;ctx.font=`bold ${18*p}px 'Arial Black',Impact,sans-serif`;ctx.fillText('★ NEW BEST! ★',this.w/2,cy+105);ctx.shadowBlur=0;}else{ctx.fillStyle=THEME.textDim;ctx.font="bold 16px Arial,sans-serif";ctx.fillText(`BEST: ${bestScore}`,this.w/2,cy+105);}this._buttons=[];const btnY=cy+160;const btnW=200,btnH=50,btnR=25;this._drawButton(ctx,this.w/2,btnY,btnW,btnH,btnR,'PLAY AGAIN',THEME.primary,time);this._buttons.push({x:this.w/2,y:btnY,w:btnW,h:btnH,action:'retry'});const sby=btnY+70;this._drawButton(ctx,this.w/2,sby,btnW,btnH,btnR,'SHARE SCORE',THEME.accentDark,time);this._buttons.push({x:this.w/2,y:sby,w:btnW,h:btnH,action:'share'});const a=0.3+Math.sin(time*3)*0.2;ctx.globalAlpha=a;ctx.fillStyle=THEME.textDim;ctx.font="400 13px Arial,sans-serif";ctx.fillText('or tap anywhere to retry',this.w/2,sby+55);ctx.globalAlpha=1; }
  _drawButton(ctx,cx,cy,w,h,r,text,color) { ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=15;ctx.beginPath();ctx.moveTo(cx-w/2+r,cy-h/2);ctx.lineTo(cx+w/2-r,cy-h/2);ctx.quadraticCurveTo(cx+w/2,cy-h/2,cx+w/2,cy-h/2+r);ctx.lineTo(cx+w/2,cy+h/2-r);ctx.quadraticCurveTo(cx+w/2,cy+h/2,cx+w/2-r,cy+h/2);ctx.lineTo(cx-w/2+r,cy+h/2);ctx.quadraticCurveTo(cx-w/2,cy+h/2,cx-w/2,cy+h/2-r);ctx.lineTo(cx-w/2,cy-h/2+r);ctx.quadraticCurveTo(cx-w/2,cy-h/2,cx-w/2+r,cy-h/2);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.fillStyle=THEME.textWhite;ctx.font="bold 18px 'Arial Black',Impact,sans-serif";ctx.textAlign='center';ctx.fillText(text,cx,cy+6); }
  hitTestButtons(x,y) { for(const b of this._buttons)if(x>b.x-b.w/2&&x<b.x+b.w/2&&y>b.y-b.h/2&&y<b.y+b.h/2)return b.action;return null; }
  shareScore(gameName,score) { const t=`I scored ${score} in ${gameName}! Can you beat that?`;if(navigator.share)navigator.share({title:gameName,text:t});else if(navigator.clipboard)navigator.clipboard.writeText(t); }
}

function drawGlow(ctx,x,y,radius,color) { const g=ctx.createRadialGradient(x,y,0,x,y,radius);g.addColorStop(0,color+'40');g.addColorStop(0.5,color+'15');g.addColorStop(1,color+'00');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fill(); }
function drawRoundedRect(ctx,x,y,w,h,r) { ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath(); }

class ArcadeEngine {
  constructor(canvasId,config={}) { this.canvas=document.getElementById(canvasId);this.ctx=this.canvas.getContext('2d');this.config=config;this.W=config.width||400;this.H=config.height||700;this.canvas.width=this.W;this.canvas.height=this.H;this._resize();window.addEventListener('resize',()=>this._resize());this.particles=new ParticleSystem();this.juice=new Juice();this.sound=new SoundManager();this.tweens=new TweenManager();this.floatingText=new FloatingTextManager();this.input=new InputHandler(this.canvas,this.W,this.H);this.bg=new Background(this.W,this.H);this.ui=new UI(this.W,this.H);this.state='menu';this.score=0;this.combo=0;this.time=0;this.gameName=config.name||'ARCADE';this._storageKey='arcade_best_'+this.gameName.toLowerCase().replace(/\s/g,'_');this.ui.bestScore=parseInt(localStorage.getItem(this._storageKey)||'0');this._lastTime=0;this._running=false;this.input.on('tap',d=>this._onTap(d));this.input.on('drag_start',d=>this._onInput('drag_start',d));this.input.on('drag_move',d=>this._onInput('drag_move',d));this.input.on('drag_end',d=>this._onInput('drag_end',d)); }
  _resize() { const s=Math.min(window.innerWidth/this.W,window.innerHeight/this.H,1);this.canvas.style.width=this.W*s+'px';this.canvas.style.height=this.H*s+'px'; }
  start() { this._running=true;requestAnimationFrame(t=>this._loop(t)); }
  setState(ns) { const os=this.state;this.state=ns;if(ns==='playing'){this.score=0;this.combo=0;this.ui.scoreDisplay=0;this.particles.clear();this.floatingText.clear();this.tweens.clear();}if(ns==='gameover'){this._isNewBest=this.ui.saveBest(this.score);localStorage.setItem(this._storageKey,String(this.ui.bestScore));this.sound.gameOver();if(this._isNewBest){setTimeout(()=>this.sound.newBest(),400);this.juice.flash(THEME.highlight,0.2);}}if(this.config.onStateChange)this.config.onStateChange(ns,os); }
  addScore(amount=1) { this.score+=amount;this.combo++;if(this.combo>2)this.sound.combo(this.combo);else this.sound.score(); }
  resetCombo() { this.combo=0; }
  _onTap(data) { this.sound.init();if(this.state==='menu'){this.setState('playing');if(this.config.onInput)this.config.onInput('tap',data,this);return;}if(this.state==='gameover'){const a=this.ui.hitTestButtons(data.x,data.y);if(a==='share'){this.ui.shareScore(this.gameName,this.score);return;}this.setState('playing');if(this.config.onStateChange)this.config.onStateChange('playing','gameover');return;}if(this.config.onInput)this.config.onInput('tap',data,this); }
  _onInput(type,data) { this.sound.init();if(this.state==='playing'&&this.config.onInput)this.config.onInput(type,data,this); }
  _loop(timestamp) { if(!this._running)return;const rawDt=Math.min((timestamp-this._lastTime)/1000,0.05);this._lastTime=timestamp;const dt=rawDt*this.juice.getTimeScale();this.time+=dt;this.juice.update(rawDt);this.tweens.update(dt);this.particles.update(dt);this.floatingText.update(dt);this.ui.updateScore(this.score,dt);if(this.state==='playing'&&this.config.onUpdate)this.config.onUpdate(dt,this);const ctx=this.ctx;ctx.save();this.juice.applyShake(ctx);this.bg.draw(ctx,this.time);if(this.config.onDraw)this.config.onDraw(ctx,this);this.particles.draw(ctx);this.floatingText.draw(ctx);if(this.state==='playing')this.ui.drawScore(ctx,this.score,this.combo,this.time);this.juice.drawFlash(ctx,this.W,this.H);if(this.state==='menu')this.ui.drawMenuScreen(ctx,this.gameName,this.time);else if(this.state==='gameover')this.ui.drawGameOverScreen(ctx,this.score,this.ui.bestScore,this._isNewBest,this.time);ctx.restore();requestAnimationFrame(t=>this._loop(t)); }
}

// ---- ENGINE END ----

// ============================================================
// BIN IT! — Throw paper balls into the bin
// ============================================================

// Game objects
let ball = { x: 200, y: 480, vx: 0, vy: 0, rotation: 0, thrown: false, visible: true };
let bin = { x: 200, y: 130, width: 56, openWidth: 48, depth: 75 };
let trail = [];
let wind = 0;
let windTarget = 0;
let difficulty = 0; // increases with score
let isDragging = false;
let dragData = null;

// Wind indicator
let windParticles = [];
for (let i = 0; i < 15; i++) {
  windParticles.push({
    x: Math.random() * 400,
    y: Math.random() * 700,
    speed: 0.5 + Math.random() * 1.5,
    size: 1 + Math.random() * 2,
    alpha: 0.05 + Math.random() * 0.1,
  });
}

function resetBall(engine) {
  ball.x = 150 + Math.random() * 100;
  ball.y = 480;
  ball.vx = 0;
  ball.vy = 0;
  ball.rotation = 0;
  ball.thrown = false;
  ball.visible = true;
  trail = [];
  isDragging = false;
  dragData = null;

  // Move bin based on difficulty
  const range = Math.min(60 + difficulty * 8, 200);
  bin.x = 200 + (Math.random() - 0.5) * range;
  bin.x = Math.max(60, Math.min(340, bin.x));

  // Adjust wind
  const maxWind = Math.min(difficulty * 8, 80);
  windTarget = (Math.random() - 0.5) * maxWind;
}

function drawBin(ctx, engine) {
  const { x, y, width, depth } = bin;

  // Glow
  drawGlow(ctx, x, y, 70, THEME.accent);

  // Bin body gradient
  const grad = ctx.createLinearGradient(x - width/2, 0, x + width/2, 0);
  grad.addColorStop(0, THEME.accentDark);
  grad.addColorStop(0.3, THEME.accent);
  grad.addColorStop(0.7, THEME.accent);
  grad.addColorStop(1, THEME.accentDark);
  ctx.fillStyle = grad;

  // Tapered bin shape
  ctx.beginPath();
  ctx.moveTo(x - width/2 - 4, y - 38);
  ctx.lineTo(x + width/2 + 4, y - 38);
  ctx.lineTo(x + width/2 - 4, y + depth/2);
  ctx.lineTo(x - width/2 + 4, y + depth/2);
  ctx.closePath();
  ctx.fill();

  // Rim with glow
  ctx.strokeStyle = THEME.accent;
  ctx.lineWidth = 4;
  ctx.shadowColor = THEME.accent;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(x - width/2 - 8, y - 38);
  ctx.lineTo(x + width/2 + 8, y - 38);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Inner darkness
  ctx.fillStyle = '#030308';
  ctx.beginPath();
  ctx.moveTo(x - width/2 + 2, y - 36);
  ctx.lineTo(x + width/2 - 2, y - 36);
  ctx.lineTo(x + width/2 - 6, y - 16);
  ctx.lineTo(x - width/2 + 6, y - 16);
  ctx.closePath();
  ctx.fill();

  // Subtle highlight stripe
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(x - width/2 + 2, y - 30, 5, depth - 16);

  // Metal bands
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x - width/2 + 2, y - 5, width - 4, 3);
  ctx.fillRect(x - width/2 + 2, y + 20, width - 4, 3);
}

function drawPaperBall(ctx, engine) {
  if (!ball.visible) return;

  const { x, y, rotation } = ball;
  const bobY = ball.thrown ? 0 : Math.sin(engine.time * 3) * 4;

  ctx.save();
  ctx.translate(x, y + bobY);
  ctx.rotate(rotation);

  // Glow
  drawGlow(ctx, 0, 0, 35, THEME.primary);

  // Crumpled paper ball shape
  const pulse = 1 + Math.sin(engine.time * 8) * 0.04;
  ctx.fillStyle = THEME.primary;
  ctx.shadowColor = THEME.primaryLight;
  ctx.shadowBlur = 15;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + engine.time * (ball.thrown ? 0 : 1.5);
    const r = (13 + Math.sin(angle * 3 + engine.time * 4) * 2.5) * pulse;
    if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
    else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();

  // Center highlight
  ctx.fillStyle = THEME.primaryLight;
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(-2, -2, 5 * pulse, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawTrail(ctx) {
  if (trail.length < 2) return;
  for (let i = 1; i < trail.length; i++) {
    const alpha = (i / trail.length) * 0.5;
    const width = (i / trail.length) * 7;
    ctx.strokeStyle = THEME.primary;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawDragIndicator(ctx, engine) {
  if (!isDragging || !dragData) return;

  const dx = dragData.startX - dragData.x;
  const dy = dragData.startY - dragData.y;
  const power = Math.min(Math.sqrt(dx * dx + dy * dy) / 150, 1);

  // Direction line
  ctx.strokeStyle = THEME.primary;
  ctx.lineWidth = 2 + power * 3;
  ctx.shadowColor = THEME.primary;
  ctx.shadowBlur = 8 + power * 12;
  ctx.globalAlpha = 0.3 + power * 0.5;
  ctx.beginPath();
  ctx.moveTo(ball.x, ball.y);
  ctx.lineTo(ball.x + dx * 0.4, ball.y + dy * 0.4);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Power ring
  ctx.strokeStyle = THEME.highlight;
  ctx.lineWidth = 3;
  ctx.shadowColor = THEME.highlight;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 22 + power * 18, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * power);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Power text
  if (power > 0.3) {
    ctx.fillStyle = THEME.highlight;
    ctx.globalAlpha = power;
    ctx.font = "bold 14px 'Arial Black', Impact, sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(power * 100) + '%', ball.x, ball.y + 55);
    ctx.globalAlpha = 1;
  }
}

function drawWind(ctx, engine) {
  if (Math.abs(wind) < 5) return;

  // Wind indicator at top
  const windNorm = wind / 80;
  const arrowX = 200 + windNorm * 80;

  ctx.fillStyle = THEME.textDim;
  ctx.font = "600 11px Arial, sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText('WIND', 200, 55);

  // Arrow
  ctx.strokeStyle = THEME.primaryLight;
  ctx.lineWidth = 2;
  ctx.shadowColor = THEME.primaryLight;
  ctx.shadowBlur = 6;
  ctx.globalAlpha = Math.min(Math.abs(windNorm) * 2, 0.8);
  ctx.beginPath();
  ctx.moveTo(200, 65);
  ctx.lineTo(arrowX, 65);
  // Arrowhead
  const dir = Math.sign(windNorm);
  ctx.lineTo(arrowX - dir * 6, 60);
  ctx.moveTo(arrowX, 65);
  ctx.lineTo(arrowX - dir * 6, 70);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Floating wind particles
  windParticles.forEach(wp => {
    wp.x += wind * wp.speed * 0.02;
    if (wp.x > 420) wp.x = -20;
    if (wp.x < -20) wp.x = 420;
    ctx.globalAlpha = wp.alpha;
    ctx.fillStyle = '#fff';
    ctx.fillRect(wp.x, wp.y, wp.size * (1 + Math.abs(windNorm)), 1);
  });
  ctx.globalAlpha = 1;
}

function drawInstruction(ctx, engine) {
  if (ball.thrown || isDragging) return;

  const alpha = 0.3 + Math.sin(engine.time * 3) * 0.25;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = THEME.textWhite;
  ctx.font = "600 14px Arial, sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText('drag & release to throw', 200, 560);
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME INSTANCE
// ============================================================
const game = new ArcadeEngine('game', {
  name: 'BIN IT!',
  width: 400,
  height: 700,

  onStateChange(newState, oldState) {
    if (newState === 'playing') {
      difficulty = 0;
      wind = 0;
      windTarget = 0;
      resetBall(game);
    }
  },

  onInput(type, data, engine) {
    if (type === 'drag_start') {
      if (ball.thrown) return;
      const dx = data.x - ball.x;
      const dy = data.y - ball.y;
      if (dx * dx + dy * dy < 3600) { // 60px radius
        isDragging = true;
      }
    }

    if (type === 'drag_move' && isDragging) {
      dragData = data;
    }

    if (type === 'drag_end' && isDragging) {
      isDragging = false;
      const dx = data.startX - data.x;
      const dy = data.startY - data.y;
      const power = Math.sqrt(dx * dx + dy * dy);

      if (power > 25) {
        ball.thrown = true;
        ball.vx = dx * 2.2;
        ball.vy = dy * 2.2;
        engine.sound.throw();
        engine.particles.emit(ball.x, ball.y, 8, {
          colors: [THEME.primary, THEME.primaryLight],
          speed: [1, 3],
          life: [0.3, 0.6],
        });
      }
      dragData = null;
    }

    if (type === 'tap' && !ball.thrown) {
      // Do nothing on tap when playing - need drag to throw
    }
  },

  onUpdate(dt, engine) {
    // Wind interpolation
    wind += (windTarget - wind) * dt * 2;

    if (ball.thrown) {
      // Physics
      ball.vy += 400 * dt; // gravity
      ball.vx += wind * dt; // wind
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.rotation += (ball.vx * 0.01) * dt * 10;

      // Trail
      trail.push({ x: ball.x, y: ball.y });
      if (trail.length > 20) trail.shift();

      // Trail particles
      if (Math.random() < 0.25) {
        engine.particles.emit(ball.x, ball.y, 1, {
          colors: [THEME.primaryLight],
          speed: [0.3, 1],
          size: [1, 2.5],
          life: [0.2, 0.5],
          gravity: 0,
        });
      }

      // Check bin collision - ball entering the top opening
      const binLeft = bin.x - bin.openWidth / 2;
      const binRight = bin.x + bin.openWidth / 2;
      const binTop = bin.y - 38;
      const binBottom = bin.y - 15;

      if (ball.y > binTop && ball.y < binBottom &&
          ball.x > binLeft && ball.x < binRight &&
          ball.vy > 0) {
        // SCORE!
        ball.visible = false;
        ball.thrown = false;

        engine.addScore(1);
        difficulty = engine.score;
        engine.juice.shake(6 + Math.min(engine.combo, 5));
        engine.juice.flash(THEME.success, 0.15);

        // Particles burst from bin
        engine.particles.emit(bin.x, binTop, 18, {
          speed: [2, 6],
          size: [2, 5],
          life: [0.5, 1.2],
          gravity: 80,
          angle: -Math.PI / 2,
          spread: Math.PI * 0.8,
          colors: [THEME.success, THEME.accent, THEME.highlight, '#fff'],
        });

        // Score popup
        const comboText = engine.combo > 2 ? `+1  x${engine.combo}` : '+1';
        const textColor = engine.combo > 4 ? THEME.highlight : engine.combo > 2 ? THEME.accent : THEME.success;
        engine.floatingText.spawn(bin.x, binTop - 30, comboText, {
          color: textColor,
          size: 22 + Math.min(engine.combo * 2, 14),
          duration: 1,
        });

        // Reset ball after short delay
        setTimeout(() => resetBall(engine), 600);
      }

      // Miss - off screen
      if (ball.y > 750 || ball.x < -60 || ball.x > 460) {
        if (engine.score > 0 || ball.y > 750) {
          // Game over if they had a score going, or if ball falls below screen
          engine.sound.miss();
          engine.juice.shake(4);
          engine.juice.flash(THEME.fail, 0.1);
          engine.setState('gameover');
        } else {
          // First throw miss - let them try again
          engine.sound.miss();
          engine.resetCombo();
          resetBall(engine);
        }
      }
    }
  },

  onDraw(ctx, engine) {
    drawWind(ctx, engine);
    drawTrail(ctx);
    drawBin(ctx, engine);
    drawDragIndicator(ctx, engine);
    drawPaperBall(ctx, engine);
    drawInstruction(ctx, engine);
  },
});

game.start();
</script>
